services:
  mysql:
    image: mysql:8.0
    container_name: portfolio-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: portfolio_ph
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: portfolio
      MYSQL_PASSWORD: password
      MYSQL_TCP_PORT: 3306
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - portfolio-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: portfolio-admin
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "9000:9000"
    restart: unless-stopped
    networks:
      - portfolio-net
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: portfolio_ph
      DB_USERNAME: portfolio
      DB_PASSWORD: password

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    restart: unless-stopped
    networks:
      - portfolio-net
    depends_on:
      - app

volumes:
  mysql_data:

networks:
  portfolio-net:
    driver: bridge
